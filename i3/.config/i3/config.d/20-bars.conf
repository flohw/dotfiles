##
## 20 - Bar definitions
##

# Status bar
bar {
    status_command i3blocks -c $HOME/.config/i3blocks/config-bottom
    position top
    tray_output none
    output primary

    colors {
        background $nord00
        separator  $nord01
        statusline $nord04

        # State            BORDER  BG      TEXT
        focused_workspace  $nord05 $nord0D $nord00
        active_workspace   $nord05 $nord03 $nord00
        inactive_workspace $nord03 $nord01 $nord05
        urgent_workspace   $nord08 $nord08 $nord00
        binding_mode       $nord00 $nord0A $nord00
    }
}

bar {
    status_command i3blocks
    position top
    output $rightMonitor

    colors {
        background $black
        separator  $black
        statusline $white

        # State            BORDER      BG          TEXT
        focused_workspace  $greyDarker $blue       $black
        active_workspace   $grey       $greyDarker $black
        inactive_workspace $greyDarker $black      $greyDarker
        urgent_workspace   $red        $red        $black
        binding_mode       $black      $magenta    $black
    }
}

